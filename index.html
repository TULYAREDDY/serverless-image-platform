<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudGallery | Luxury Edition</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0A0A0F;
      --surface-1: rgba(255, 255, 255, 0.03);
      --surface-2: rgba(255, 255, 255, 0.06);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #F3F3F2;
      --text-muted: #8A8A93;
      --accent: #00E5FF;
      --accent-glow: rgba(0, 229, 255, 0.4);
      --danger: #FF3366;
      --danger-glow: rgba(255, 51, 102, 0.4);
      
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-full: 9999px;
      --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      
      --font-display: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-display);
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      position: relative;
    }

    /* Grain Overlay */
    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; z-index: 50;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 64px 24px; position: relative; z-index: 1; }
    
    /* Header */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 32px; margin-bottom: 48px;
      border-bottom: 1px solid var(--border-color);
    }
    .logo { 
      font-size: 1.5rem; font-weight: 700; 
      display: flex; align-items: center; gap: 12px;
      letter-spacing: -0.02em;
    }
    .logo svg { width: 28px; height: 28px; color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
    
    .user-nav { display: flex; align-items: center; gap: 24px; }
    
    .avatar {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      background: var(--surface-2); border: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 0.875rem; font-weight: 500;
      color: var(--accent); text-transform: uppercase;
    }

    /* Typography */
    h1, h2, h3 { font-weight: 600; letter-spacing: -0.02em; }
    h2 { font-size: 1.75rem; margin-bottom: 24px; }
    .muted { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.875rem; }

    /* Buttons */
    button {
      font-family: var(--font-display); font-weight: 600; font-size: 0.95rem;
      border: none; background: transparent; color: var(--text-main);
      cursor: pointer; transition: all 0.3s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost { position: relative; padding: 8px 0; color: var(--text-muted); }
    .btn-ghost::after {
      content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px;
      background: var(--accent); transition: width 0.3s ease;
    }
    .btn-ghost:hover { color: var(--text-main); }
    .btn-ghost:hover::after { width: 100%; }

    .btn-primary {
      width: 100%; padding: 16px; border-radius: var(--radius-sm);
      background: var(--accent); color: var(--bg-color);
      position: relative; overflow: hidden;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
      transform: skewX(-20deg); transition: left 0.5s ease;
    }
    .btn-primary:hover:not(:disabled)::before { left: 150%; }

    /* Inputs */
    input[type="email"], input[type="password"] {
      width: 100%; padding: 16px; background: var(--surface-1);
      border: 1px solid var(--border-color); border-radius: var(--radius-sm);
      color: var(--text-main); font-family: var(--font-mono); font-size: 0.875rem;
      margin-bottom: 16px; transition: all 0.3s ease; outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); background: var(--surface-2); }

    /* Upload Area */
    .upload-container {
      background: var(--surface-1); border: 1px solid var(--border-color);
      border-radius: var(--radius-md); padding: 32px;
      backdrop-filter: blur(10px); margin-bottom: 64px;
    }
    
    .dropzone {
      border: 1px dashed var(--border-color); border-radius: var(--radius-sm);
      padding: 64px 32px; text-align: center; position: relative; cursor: pointer;
      transition: all 0.3s ease; overflow: hidden;
    }
    
    .dropzone::before {
      content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
      border: 1px dashed var(--accent); border-radius: inherit;
      opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
    }
    
    .dropzone:hover { background: rgba(0, 229, 255, 0.02); }
    .dropzone:hover::before { opacity: 1; animation: dash 20s linear infinite; }
    .dropzone.active { background: rgba(0, 229, 255, 0.05); box-shadow: inset 0 0 40px var(--accent-glow); }
    
    @keyframes dash { to { stroke-dashoffset: 1000; } }

    .dropzone input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; z-index: 10;
    }

    .dropzone-icon {
      width: 48px; height: 48px; color: var(--text-muted); margin: 0 auto 24px;
      transition: all 0.3s ease;
    }
    .dropzone:hover .dropzone-icon { color: var(--accent); filter: drop-shadow(0 0 10px var(--accent-glow)); transform: translateY(-4px); }

    .file-preview { margin-top: 16px; font-family: var(--font-mono); font-size: 0.875rem; color: var(--accent); }

    /* Gallery Masonry */
    .gallery-grid {
      column-count: 1; column-gap: 24px; margin-top: 32px;
    }
    @media (min-width: 600px) { .gallery-grid { column-count: 2; } }
    @media (min-width: 900px) { .gallery-grid { column-count: 3; } }

    .image-card {
      break-inside: avoid; margin-bottom: 24px; position: relative;
      border-radius: var(--radius-md); overflow: hidden;
      background: var(--surface-1); border: 1px solid var(--border-color);
      transform: scale(1); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
      opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .image-card:hover { transform: scale(1.03); box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 2; }
    
    .image-card img { width: 100%; display: block; }
    
    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 32px 16px 16px;
      background: linear-gradient(to top, rgba(10,10,15,0.95), transparent);
      display: flex; justify-content: space-between; align-items: center;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .image-card:hover .card-overlay { transform: translateY(0); }
    
    .image-id {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-main);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;
    }

    .btn-icon {
      width: 32px; height: 32px; border-radius: var(--radius-full);
      background: var(--surface-2); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-main); transition: all 0.2s ease;
    }
    .btn-icon:hover { background: var(--text-main); color: var(--bg-color); }
    .btn-icon.danger:hover { background: var(--danger); color: white; box-shadow: 0 0 15px var(--danger-glow); }

    /* Empty State */
    .empty-state { text-align: center; padding: 120px 24px; grid-column: 1 / -1; }
    .empty-icon { width: 64px; height: 64px; color: var(--surface-2); margin: 0 auto 24px; }

    /* Auth Panel */
    .auth-panel {
      max-width: 440px; margin: 10vh auto; background: var(--surface-1);
      padding: 48px; border-radius: var(--radius-md); border: 1px solid var(--border-color);
      box-shadow: var(--shadow-glass); backdrop-filter: blur(20px);
    }

    /* Toast */
    #toast-container { position: fixed; bottom: 32px; right: 32px; z-index: 100; display: flex; flex-direction: column; gap: 12px; }
    .toast {
      background: var(--surface-1); border: 1px solid var(--border-color);
      color: var(--text-main); padding: 16px 24px; border-radius: var(--radius-sm);
      font-family: var(--font-mono); font-size: 0.875rem;
      backdrop-filter: blur(10px); box-shadow: var(--shadow-glass);
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      display: flex; align-items: center; gap: 12px;
    }
    .toast::before { content: ''; display: block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .toast.error::before { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
    
    @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

    .hidden { display: none !important; }
    .spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <!-- AUTH VIEW -->
  <div id="authView" class="container hidden">
    <div class="auth-panel">
      <div class="logo" style="justify-content: center; margin-bottom: 40px; font-size: 2rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        CloudGallery
      </div>
      <h2 style="text-align: center; margin-bottom: 8px;">Access Portal</h2>
      <p class="muted" style="text-align: center; margin-bottom: 32px;">Enter your credentials to continue</p>
      
      <input type="email" id="email" placeholder="user@domain.com" />
      <input type="password" id="password" placeholder="••••••••" />
      
      <div style="display: flex; gap: 16px; margin-top: 24px;">
        <button onclick="signIn()" id="btnSignIn" class="btn-primary" style="flex: 1;">Authenticate</button>
      </div>
      <div style="text-align: center; margin-top: 24px;">
        <button onclick="signUp()" id="btnSignUp" class="btn-ghost" style="font-size: 0.875rem;">Create an account instead</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="container hidden">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        CloudGallery
      </div>
      <div class="user-nav">
        <span class="muted" id="userEmailDisplay" style="display: none;"></span>
        <div class="avatar" id="userAvatar">A</div>
        <button onclick="signOut()" id="btnSignOut" class="btn-ghost">Sign Out</button>
      </div>
    </header>

    <div class="upload-container">
      <div class="dropzone" id="dropzone" ondragover="this.classList.add('active')" ondragleave="this.classList.remove('active')" ondrop="this.classList.remove('active')">
        <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <p style="font-size: 1.1rem; color: var(--text-main);">Drag & drop an image here</p>
        <p class="muted" style="margin-top: 8px;">or click to browse from your device</p>
        <p class="file-preview" id="fileNameDisplay"></p>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)" />
      </div>
      <div style="margin-top: 24px;">
        <button onclick="uploadImage()" id="uploadBtn" class="btn-primary" disabled>Upload Image</button>
      </div>
    </div>

    <div>
      <h2 style="display: flex; align-items: center; gap: 12px;">
        Vault
        <span id="imageCount" class="muted" style="font-size: 1rem;"></span>
      </h2>
      <div id="gallery" class="gallery-grid">
        <!-- Images injected here -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // 🔹 CONFIG
    const CLOUD_NAME = "dho6q6sbj";
    const UPLOAD_PRESET = "myproj";
    const SUPABASE_URL = "https://ragirktlncfnvlomqsiw.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhZ2lya3RsbmNmbnZsb21xc2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDYwNjYsImV4cCI6MjA5MzI4MjA2Nn0.0iNOQh_irF5QE2A9S5Ay-2mWAf-SBP7M6qdfwazEWD4";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 🔹 UI UTILS
    const spinnerSvg = `<svg class="spin" style="width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>`;

    function showToast(message, type = 'success') {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerText = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        toast.style.transition = 'all 0.4s ease';
        setTimeout(() => toast.remove(), 400);
      }, 4000);
    }

    function setLoading(btnId, isLoading, originalText) {
      const btn = document.getElementById(btnId);
      if (isLoading) {
        btn.disabled = true;
        btn.innerHTML = `${spinnerSvg} Processing...`;
      } else {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    // 🔹 AUTHENTICATION
    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      updateAuthUI(session);
      
      supabaseClient.auth.onAuthStateChange((event, session) => {
        updateAuthUI(session);
      });
    });

    function updateAuthUI(session) {
      const authView = document.getElementById('authView');
      const dashboardView = document.getElementById('dashboardView');
      
      if (session?.user) {
        authView.classList.add('hidden');
        dashboardView.classList.remove('hidden');
        
        const email = session.user.email;
        document.getElementById('userEmailDisplay').innerText = email;
        document.getElementById('userAvatar').innerText = email.charAt(0).toUpperCase();
        
        loadImages();
      } else {
        authView.classList.remove('hidden');
        dashboardView.classList.add('hidden');
      }
    }

    async function signUp() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      if (!email || !password) return showToast("Enter credentials", "error");

      setLoading("btnSignUp", true, "Create an account instead");
      const { error } = await supabaseClient.auth.signUp({ email, password });
      setLoading("btnSignUp", false, "Create an account instead");

      if (error) showToast(error.message, "error");
      else showToast("Account created!");
    }

    async function signIn() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      if (!email || !password) return showToast("Enter credentials", "error");

      setLoading("btnSignIn", true, "Authenticate");
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      setLoading("btnSignIn", false, "Authenticate");

      if (error) showToast(error.message, "error");
      else showToast("Authenticated successfully");
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
      showToast("Signed out");
    }

    // 🔹 UPLOAD LOGIC
    function handleFileSelect(e) {
      const file = e.target.files[0];
      const nameDisplay = document.getElementById("fileNameDisplay");
      const uploadBtn = document.getElementById("uploadBtn");
      const dropzone = document.getElementById("dropzone");
      
      if (file) {
        nameDisplay.innerText = file.name;
        uploadBtn.disabled = false;
        dropzone.style.borderColor = "var(--accent)";
      } else {
        nameDisplay.innerText = "";
        uploadBtn.disabled = true;
        dropzone.style.borderColor = "var(--border-color)";
      }
    }

    async function uploadImage() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return;

      const { data: userData } = await supabaseClient.auth.getUser();
      const user = userData?.user;
      if (!user) return showToast("Authentication required", "error");

      setLoading("uploadBtn", true, "Upload Image");

      try {
        // 🔹 1. Fetch user's existing hashes from Supabase
        const { data: hashData, error: hashError } = await supabaseClient
            .from("images")
            .select("phash")
            .eq("user_id", user.id);
            
        if (hashError) console.error("Hash fetch error:", hashError);
        console.log("Raw hash data from DB:", hashData);
        
        const existingHashes = hashData ? hashData.map(row => row.phash).filter(h => h) : [];
        console.log("Filtered existing hashes:", existingHashes);

        // 🔹 2. Check for duplicates using local Python API
        const checkFormData = new FormData();
        checkFormData.append("file", file);
        checkFormData.append("existing_hashes", JSON.stringify(existingHashes));

        console.log("Calling local API...");
        const checkResponse = await fetch("http://localhost:8000/check-duplicate", {
          method: "POST",
          body: checkFormData
        });
        
        if (!checkResponse.ok) {
           throw new Error("Backend API failed with status: " + checkResponse.status);
        }
        
        const checkData = await checkResponse.json();
        console.log("Backend response:", checkData);
        
        if (checkData.error) {
           throw new Error("Backend returned error: " + checkData.error);
        }
        
        if (checkData.is_duplicate) {
          showToast("Similar image already exists in your vault", "error");
          setLoading("uploadBtn", false, "Upload Image");
          return;
        }
        
        const generated_phash = checkData.hash;
        console.log("New image hash:", generated_phash);

        // 🔹 2. Upload to Cloudinary
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: "POST", body: formData
        });
        const data = await response.json();

        if (!data.public_id) throw new Error("Cloud provider error");

        // 🔹 3. Save to Supabase
        const { error } = await supabaseClient.from("images").insert([{
          user_id: user.id,
          public_id: data.public_id,
          phash: generated_phash
        }]);

        if (error) throw error;

        showToast("Image stored securely");
        
        document.getElementById("fileInput").value = "";
        document.getElementById("fileNameDisplay").innerText = "";
        document.getElementById("uploadBtn").disabled = true;
        document.getElementById("dropzone").style.borderColor = "var(--border-color)";
        
        loadImages();
      } catch (err) {
        console.error(err);
        showToast("Upload failed", "error");
      } finally {
        setLoading("uploadBtn", false, "Upload Image");
      }
    }

    // 🔹 GALLERY & DELETE LOGIC
    async function loadImages() {
      const gallery = document.getElementById("gallery");
      const countDisplay = document.getElementById("imageCount");
      
      gallery.innerHTML = `<div class="muted" style="grid-column: 1/-1; display:flex; align-items:center; gap:12px;">${spinnerSvg} Synchronizing...</div>`;
      countDisplay.innerText = "";

      const { data: userData } = await supabaseClient.auth.getUser();
      const user = userData?.user;
      if (!user) return;

      const { data, error } = await supabaseClient
        .from("images")
        .select("public_id")
        .eq("user_id", user.id)
        .order('id', { ascending: false });

      if (error) {
        gallery.innerHTML = `<div class="muted" style="grid-column: 1/-1; color:var(--danger)">Sync failed.</div>`;
        return;
      }

      gallery.innerHTML = "";

      if (!data || data.length === 0) {
        countDisplay.innerText = "— 0 items";
        gallery.innerHTML = `
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <p style="font-size: 1.25rem;">Empty Vault</p>
            <p class="muted" style="margin-top: 8px;">Upload your first image to begin.</p>
          </div>`;
        return;
      }

      countDisplay.innerText = `— ${data.length} item${data.length !== 1 ? 's' : ''}`;

      data.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "image-card";
        // Staggered animation delay
        card.style.animationDelay = `${index * 0.1}s`;

        const img = document.createElement("img");
        // Maintain quality but optimize delivery
        img.src = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,q_auto,f_auto/${item.public_id}`;
        img.loading = "lazy";

        const overlay = document.createElement("div");
        overlay.className = "card-overlay";

        const idLabel = document.createElement("span");
        idLabel.className = "image-id";
        idLabel.innerText = item.public_id.split('/').pop() || item.public_id;

        const btn = document.createElement("button");
        btn.className = "btn-icon danger";
        btn.innerHTML = `<svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
        btn.title = "Delete Record";
        btn.onclick = () => deleteImage(item.public_id, card);

        overlay.appendChild(idLabel);
        overlay.appendChild(btn);
        card.appendChild(img);
        card.appendChild(overlay);
        gallery.appendChild(card);
      });
    }

    async function deleteImage(public_id, cardElement) {
      // Create a sleek custom confirmation instead of window.confirm if possible, 
      // but sticking to standard confirm for reliability as requested.
      if (!confirm("Permanently delete this record?")) return;

      const btn = cardElement.querySelector('.btn-icon');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = spinnerSvg;
      btn.disabled = true;

      const { error } = await supabaseClient
        .from("images")
        .delete()
        .eq("public_id", public_id);

      if (error) {
        showToast("Delete failed", "error");
        btn.innerHTML = originalHtml;
        btn.disabled = false;
        return;
      }

      // Smooth DOM removal
      cardElement.style.transform = 'scale(0.9)';
      cardElement.style.opacity = '0';
      setTimeout(() => {
        cardElement.remove();
        showToast("Record deleted");
        
        // Update count dynamically
        const gallery = document.getElementById("gallery");
        const countDisplay = document.getElementById("imageCount");
        const remaining = gallery.querySelectorAll('.image-card').length;
        if (remaining === 0) {
          loadImages(); // triggers empty state
        } else {
          countDisplay.innerText = `— ${remaining} item${remaining !== 1 ? 's' : ''}`;
        }
      }, 300);
    }
  </script>
</body>
</html>
